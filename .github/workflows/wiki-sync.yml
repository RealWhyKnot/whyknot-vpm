name: Sync wiki

# Mirrors wiki/ into the GitHub Wiki repo (RealWhyKnot/whyknot-vpm.wiki.git).
# The wiki repo only exists after a maintainer creates the first page in the web UI.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Sync to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if ! git clone --depth 1 "$REPO_URL" wiki-target 2>clone.err; then
            if grep -qi "repository not found" clone.err; then
              echo "::warning::Wiki repo does not exist yet. Visit the repo wiki on github.com and create the first page, then re-run this workflow."
              cat clone.err
              exit 0
            fi
            echo "::error::Failed to clone wiki repo"
            cat clone.err
            exit 1
          fi

          git -C wiki-target config user.name  "github-actions[bot]"
          git -C wiki-target config user.email "github-actions[bot]@users.noreply.github.com"

          rsync -a --delete --exclude='.git' --exclude='README.md' wiki/ wiki-target/

          if [ -z "$(git -C wiki-target status --porcelain)" ]; then
            echo "No wiki changes to sync."
            exit 0
          fi

          git -C wiki-target add -A
          git -C wiki-target commit -m "Sync wiki from wiki/ @ ${GITHUB_SHA::7}

          Source: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          git -C wiki-target push origin HEAD
          echo "Wiki synced."